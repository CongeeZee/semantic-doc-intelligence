services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: semdoc
      POSTGRES_PASSWORD: semdoc
      POSTGRES_DB: semdoc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:0.5.3
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://semdoc:semdoc@postgres:5432/semdoc
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - chroma
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  postgres_data:
  chroma_data:
  uploads:
